version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linguaisle_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: linguaisle_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist/build/h5:/usr/share/nginx/html:ro
      - ./.nginx/nginx.config:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
